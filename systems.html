<style>
.inner-section{
  background:radial-gradient(ellipse at 50% 110%, #0e2e10 0%, #060e06 55%, #030803 100%);
}
/* tree sway */
@keyframes treeSway{
  0%,100%{transform:rotate(-0.5deg);}
  50%{transform:rotate(0.5deg);}
}
.tree-group{transform-origin:bottom center;animation:treeSway 6s ease-in-out infinite;}
.tree-group:nth-child(2){animation-delay:-2s;animation-duration:7s;}
.tree-group:nth-child(3){animation-delay:-4s;animation-duration:5.5s;}
/* data stream pulse */
@keyframes tracePulse{0%,100%{opacity:0.15;}50%{opacity:0.55;}}
.trace-line{animation:tracePulse 3s ease-in-out infinite;}
.trace-line:nth-child(2){animation-delay:-1s;}
.trace-line:nth-child(3){animation-delay:-2s;}
/* mist drift */
@keyframes mistDrift{0%{transform:translateX(-30px);opacity:0.3;}50%{opacity:0.55;}100%{transform:translateX(30px);opacity:0.3;}}
.mist{animation:mistDrift 8s ease-in-out infinite;}
.mist:nth-child(2){animation-delay:-3s;animation-duration:11s;}
</style>
</head>
