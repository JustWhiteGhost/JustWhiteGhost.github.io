<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ashor Dev · Concept Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
.inner-section{
  background:radial-gradient(ellipse at 70% 80%, #1a1206 0%, #0e0c04 50%, #080604 100%);
}
.inner-section::after{
  background:linear-gradient(90deg,transparent,rgba(196,146,26,0.3),transparent);
}
/* sun pulse */
@keyframes sunPulse{0%,100%{opacity:0.4;r:46;}50%{opacity:0.7;r:52;}}
#sun-disc{animation:sunPulse 5s ease-in-out infinite;}
/* mountain shimmer */
@keyframes mountainShimmer{0%,100%{opacity:0.9;}50%{opacity:0.95;}}
.mountain-near{animation:mountainShimmer 8s ease-in-out infinite;}
/* compass spin */
@keyframes compassSpin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
/* sketch line draw */
@keyframes sketchDraw{0%{stroke-dashoffset:1600;}100%{stroke-dashoffset:0;}}
.sketch-line{stroke-dasharray:1600;stroke-dashoffset:1600;animation:sketchDraw 3s ease-out 0.5s forwards;}
</style>
</head>
<body>
<div id="site">
  <div id="cctv-overlay"><canvas id="cctv-canvas"></canvas></div>
  <div id="cctv-stamp"></div>
  <div class="bracket tl"></div><div class="bracket tr"></div>
  <div class="bracket bl"></div><div class="bracket br"></div>
  <a id="logo" href="index.html"><span>AD · ENV</span></a>
  <nav id="nav-bar"></nav>
  <div id="rec"><div id="rec-dot"></div><span id="rec-text">REC · <span id="rec-timer">00:00</span></span></div>
  <div id="section-label"><div class="sl-main">Art · Studio</div><div class="sl-sub">F/1.4 · AF-S · ISO 400</div></div>
  <div class="section-hud">ART · KRITA · PHOTOSHOP · MAPS</div>

  <div class="inner-section">
    <svg class="scene-canvas" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <!-- warm amber atmospheric bg -->
      <rect x="0" y="0" width="1600" height="900" fill="#070504"/>
      <!-- sky gradient -->
      <defs>
        <radialGradient id="sunGlow" cx="50%" cy="62%" r="45%">
          <stop offset="0%" stop-color="#2a1a06" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#070504" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect x="0" y="0" width="1600" height="900" fill="url(#sunGlow)"/>
      <!-- far mountain range -->
      <polygon class="mountain-near" points="0,900 0,580 130,410 260,565 410,335 540,490 680,290 775,470 800,370 825,470 920,300 1070,490 1220,350 1370,530 1520,370 1600,450 1600,900" fill="#0e0a03" opacity="0.95"/>
      <!-- near mountain range -->
      <polygon points="0,900 0,700 110,555 220,650 370,478 500,590 630,430 740,545 800,450 860,545 990,418 1140,590 1290,465 1450,610 1600,510 1600,900" fill="#0a0802" opacity="0.9"/>
      <!-- ground -->
      <rect x="0" y="840" width="1600" height="60" fill="#080603"/>
      <!-- sketch construction lines -->
      <line class="sketch-line" x1="0" y1="300" x2="1600" y2="300" stroke="#2e1e06" stroke-width="0.5" opacity="0.25"/>
      <line class="sketch-line" x1="0" y1="500" x2="1600" y2="500" stroke="#2e1e06" stroke-width="0.5" opacity="0.25"/>
      <line class="sketch-line" x1="400" y1="0" x2="400" y2="900" stroke="#2a1c06" stroke-width="0.5" opacity="0.2"/>
      <line class="sketch-line" x1="800" y1="0" x2="800" y2="900" stroke="#2a1c06" stroke-width="0.5" opacity="0.2"/>
      <line class="sketch-line" x1="1200" y1="0" x2="1200" y2="900" stroke="#2a1c06" stroke-width="0.5" opacity="0.2"/>
      <!-- diagonal comp lines -->
      <line class="sketch-line" x1="0" y1="0" x2="1600" y2="900" stroke="#221806" stroke-width="0.4" opacity="0.12"/>
      <line class="sketch-line" x1="1600" y1="0" x2="0" y2="900" stroke="#221806" stroke-width="0.4" opacity="0.12"/>
      <!-- sun disc -->
      <circle id="sun-disc" cx="800" cy="490" r="48" fill="none" stroke="#3a2608" stroke-width="0.9" opacity="0.45"/>
      <circle cx="800" cy="490" r="28" fill="#160e02" stroke="#2e1e06" stroke-width="0.6" opacity="0.55"/>
      <!-- sun inner glow -->
      <circle cx="800" cy="490" r="14" fill="#1e1204" opacity="0.4"/>
      <!-- compass rose — bottom left -->
      <g transform="translate(190,680)" stroke="#3a2808" stroke-width="0.8" opacity="0.3" fill="none">
        <circle cx="0" cy="0" r="35"/>
        <circle cx="0" cy="0" r="22"/>
        <line x1="0" y1="-35" x2="0" y2="35"/>
        <line x1="-35" y1="0" x2="35" y2="0"/>
        <line x1="-24" y1="-24" x2="24" y2="24"/>
        <line x1="24" y1="-24" x2="-24" y2="24"/>
        <!-- N marker -->
        <polygon points="0,-35 -4,-20 4,-20" fill="#3a2808" stroke="none" opacity="0.5"/>
      </g>
      <!-- compass rose — top right -->
      <g transform="translate(1420,160)" stroke="#2e2006" stroke-width="0.7" opacity="0.22" fill="none">
        <circle cx="0" cy="0" r="28"/>
        <line x1="0" y1="-28" x2="0" y2="28"/>
        <line x1="-28" y1="0" x2="28" y2="0"/>
        <line x1="-20" y1="-20" x2="20" y2="20"/>
        <line x1="20" y1="-20" x2="-20" y2="20"/>
      </g>
      <!-- world map grid overlay -->
      <g stroke="#201608" stroke-width="0.4" opacity="0.18">
        <line x1="0" y1="150" x2="1600" y2="150"/>
        <line x1="0" y1="450" x2="1600" y2="450"/>
        <line x1="0" y1="750" x2="1600" y2="750"/>
        <line x1="266" y1="0" x2="266" y2="900"/>
        <line x1="533" y1="0" x2="533" y2="900"/>
        <line x1="800" y1="0" x2="800" y2="900"/>
        <line x1="1067" y1="0" x2="1067" y2="900"/>
        <line x1="1334" y1="0" x2="1334" y2="900"/>
      </g>
    </svg>

    <div class="section-card">
      <div class="section-title">Concept Art</div>
      <div class="section-sub">Scene design · world maps · visual language</div>
      <div class="section-tags">
        <span class="s-tag">Krita</span>
        <span class="s-tag">Photoshop</span>
        <span class="s-tag">World Maps</span>
        <span class="s-tag">Concepts</span>
        <span class="s-tag">Storyboards</span>
      </div>
    </div>
  </div>
</div>
<script src="nav.js"></script>
</body>
</html>
