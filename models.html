<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ashor Dev · 3D Models</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
.inner-section{
  background:radial-gradient(ellipse at 30% 80%, #0a1e1a 0%, #050e0c 50%, #030807 100%);
}
.inner-section::after{
  background:linear-gradient(90deg,transparent,rgba(74,138,120,0.35),transparent);
}
/* wireframe rotation */
@keyframes wireRotate{
  0%{transform:rotateY(0deg) rotateX(8deg);}
  100%{transform:rotateY(360deg) rotateX(8deg);}
}
/* grid pulse */
@keyframes gridPulse{0%,100%{opacity:0.4;}50%{opacity:0.75;}}
.grid-line{animation:gridPulse 4s ease-in-out infinite;}
.grid-line:nth-child(2){animation-delay:-1.3s;}
.grid-line:nth-child(3){animation-delay:-2.6s;}
/* rock shimmer */
@keyframes rockShimmer{0%,100%{fill:#0e1e1a;}50%{fill:#112420;}}
.rock-a{animation:rockShimmer 5s ease-in-out infinite;}
.rock-b{animation:rockShimmer 5s ease-in-out infinite;animation-delay:-2.5s;}
</style>
</head>
<body>
<div id="site">
  <div id="cctv-overlay"><canvas id="cctv-canvas"></canvas></div>
  <div id="cctv-stamp"></div>
  <div class="bracket tl"></div><div class="bracket tr"></div>
  <div class="bracket bl"></div><div class="bracket br"></div>
  <a id="logo" href="index.html"><span>AD · ENV</span></a>
  <nav id="nav-bar"></nav>
  <div id="rec"><div id="rec-dot"></div><span id="rec-text">REC · <span id="rec-timer">00:00</span></span></div>
  <div id="section-label"><div class="sl-main">Models · Workshop</div><div class="sl-sub">F/5.6 · AF-C · ISO 1600</div></div>
  <div class="section-hud">MODELS · BLENDER · PBR TEXTURES</div>

  <div class="inner-section">
    <svg class="scene-canvas" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <!-- dark floor -->
      <rect x="0" y="590" width="1600" height="310" fill="#050c0a"/>
      <!-- perspective grid floor -->
      <g>
        <line class="grid-line" x1="800" y1="590" x2="0"    y2="900" stroke="#112018" stroke-width="0.7"/>
        <line class="grid-line" x1="800" y1="590" x2="200"  y2="900" stroke="#112018" stroke-width="0.7"/>
        <line class="grid-line" x1="800" y1="590" x2="400"  y2="900" stroke="#112018" stroke-width="0.7"/>
        <line class="grid-line" x1="800" y1="590" x2="600"  y2="900" stroke="#112018" stroke-width="0.7"/>
        <line class="grid-line" x1="800" y1="590" x2="800"  y2="900" stroke="#132018" stroke-width="1"/>
        <line class="grid-line" x1="800" y1="590" x2="1000" y2="900" stroke="#112018" stroke-width="0.7"/>
        <line class="grid-line" x1="800" y1="590" x2="1200" y2="900" stroke="#112018" stroke-width="0.7"/>
        <line class="grid-line" x1="800" y1="590" x2="1400" y2="900" stroke="#112018" stroke-width="0.7"/>
        <line class="grid-line" x1="800" y1="590" x2="1600" y2="900" stroke="#112018" stroke-width="0.7"/>
        <!-- horizontal grid lines -->
        <line class="grid-line" x1="0" y1="670" x2="1600" y2="670" stroke="#0e1c18" stroke-width="0.6"/>
        <line class="grid-line" x1="0" y1="730" x2="1600" y2="730" stroke="#0e1c18" stroke-width="0.6"/>
        <line class="grid-line" x1="0" y1="800" x2="1600" y2="800" stroke="#0e1c18" stroke-width="0.6"/>
        <line class="grid-line" x1="0" y1="860" x2="1600" y2="860" stroke="#0e1c18" stroke-width="0.6"/>
      </g>
      <!-- teal horizon glow -->
      <ellipse cx="800" cy="600" rx="650" ry="60" fill="#0a1e1a" opacity="0.5"/>
      <!-- low-poly rock shapes left -->
      <g class="rock-a" stroke="#162820" stroke-width="1">
        <polygon points="220,595 155,595 188,512"/>
        <polygon points="188,512 155,595 132,555"/>
        <polygon points="188,512 220,595 244,568"/>
        <polygon points="155,595 132,555 188,512" fill="#0c1c18" opacity="0.7"/>
      </g>
      <!-- rock right -->
      <g class="rock-b" stroke="#142618" stroke-width="1">
        <polygon points="1385,595 1318,595 1352,505"/>
        <polygon points="1352,505 1318,595 1295,552"/>
        <polygon points="1352,505 1385,595 1408,558"/>
        <polygon points="1318,595 1295,552 1352,505" fill="#0c1c18" opacity="0.7"/>
      </g>
      <!-- small rocks -->
      <g fill="#0d1c1a" stroke="#142418" stroke-width="0.7" opacity="0.8">
        <polygon points="420,595 390,595 405,568"/>
        <polygon points="1180,595 1150,595 1165,565"/>
        <polygon points="660,595 638,595 649,572"/>
        <polygon points="960,595 938,595 949,568"/>
      </g>
      <!-- wireframe cube bg — large -->
      <g stroke="#1e4030" stroke-width="0.9" fill="none" opacity="0.3">
        <rect x="700" y="330" width="200" height="200"/>
        <!-- top face -->
        <polygon points="700,330 745,285 945,285 900,330" stroke="#1e4030"/>
        <!-- right face -->
        <polygon points="900,330 945,285 945,485 900,530" stroke="#1e4030"/>
        <!-- internal edges -->
        <line x1="700" y1="530" x2="745" y2="485"/>
        <line x1="745" y1="485" x2="945" y2="485"/>
        <line x1="745" y1="485" x2="745" y2="285"/>
      </g>
      <!-- smaller cube left -->
      <g stroke="#163428" stroke-width="0.7" fill="none" opacity="0.25">
        <rect x="250" y="390" width="120" height="120"/>
        <polygon points="250,390 278,362 398,362 370,390"/>
        <polygon points="370,390 398,362 398,482 370,510"/>
        <line x1="250" y1="510" x2="278" y2="482"/>
        <line x1="278" y1="482" x2="398" y2="482"/>
        <line x1="278" y1="482" x2="278" y2="362"/>
      </g>
      <!-- smaller cube right -->
      <g stroke="#163428" stroke-width="0.7" fill="none" opacity="0.25">
        <rect x="1230" y="400" width="110" height="110"/>
        <polygon points="1230,400 1255,375 1365,375 1340,400"/>
        <polygon points="1340,400 1365,375 1365,485 1340,510"/>
        <line x1="1230" y1="510" x2="1255" y2="485"/>
        <line x1="1255" y1="485" x2="1365" y2="485"/>
        <line x1="1255" y1="485" x2="1255" y2="375"/>
      </g>
      <!-- vertex dots -->
      <g fill="#1e4030" opacity="0.5">
        <circle cx="700" cy="330" r="2.5"/><circle cx="900" cy="330" r="2.5"/>
        <circle cx="700" cy="530" r="2.5"/><circle cx="900" cy="530" r="2.5"/>
        <circle cx="745" cy="285" r="2.5"/><circle cx="945" cy="285" r="2.5"/>
        <circle cx="945" cy="485" r="2.5"/>
      </g>
    </svg>

    <div class="section-card">
      <div class="section-title">3D Models</div>
      <div class="section-sub">Low poly to mid poly · stylized to realistic</div>
      <div class="section-tags">
        <span class="s-tag">Blender</span>
        <span class="s-tag">PBR</span>
        <span class="s-tag">Low-Poly</span>
        <span class="s-tag">Rigging</span>
        <span class="s-tag">UV Maps</span>
      </div>
    </div>
  </div>
</div>
<script src="nav.js"></script>
</body>
</html>
