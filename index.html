<style>
/* ── HERO-SPECIFIC ─────────────────────────────── */
#hero{background:var(--green-900);position:absolute;inset:0;}

#scene-zoom{
  position:absolute;inset:0;
  transform:scale(1.12);
  transform-origin:center 60%;
}
.p-layer{
  position:absolute;
  top:0;left:-8%;
  width:116%;height:100%;
  will-change:transform;
  transition:transform 0.06s linear;
  pointer-events:none;
}
#layer-sky     {left:0;width:100%;z-index:1;}
#layer-city    {z-index:2;}
#layer-buildings{z-index:3;}
#layer-billboard{z-index:4;}
#layer-rooftop {z-index:5;}
#layer-fg      {z-index:6;}
#sky-canvas{position:absolute;inset:0;width:100%;height:100%;}

#hud{position:absolute;inset:0;z-index:20;pointer-events:none;}
#hud canvas{position:absolute;inset:0;width:100%;height:100%;}
.rot-line{position:absolute;background:rgba(46,94,48,0.12);pointer-events:none;}
.rot-h{left:0;right:0;height:1px;}
.rot-v{top:0;bottom:0;width:1px;}
#rl1{top:33.33%;}#rl2{top:66.66%;}#rv1{left:33.33%;}#rv2{left:66.66%;}
#conv-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

#particle-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:15;pointer-events:none;}

.layer-svg{position:absolute;bottom:0;left:0;width:100%;height:100%;overflow:visible;}

#enter-hint{
  position:fixed;bottom:88px;left:50%;
  transform:translateX(-50%);
  z-index:100;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;
  gap:5px;
  opacity:0;animation:fadeIn 0.8s ease 2.4s forwards;
}
#enter-hint span{
  font-size:8px;letter-spacing:.18em;
  color:var(--text-hud-dim);text-transform:uppercase;
  font-style:italic;
  font-family:'Crimson Pro',serif;
}
#enter-hint-dot{
  width:4px;height:4px;border-radius:50%;
  background:var(--green-500);
  animation:pulse 2.5s ease-in-out infinite;
}
</style>

<script>
const W=()=>window.innerWidth, H=()=>window.innerHeight;
let mx=W()/2, my=H()/2;

/* ── SKY ── */
const skyCanvas=document.getElementById('sky-canvas');
const skyCtx=skyCanvas.getContext('2d');
function resizeSky(){skyCanvas.width=W();skyCanvas.height=H();}
resizeSky();
function getSkyColors(){
  const h=new Date().getHours();
  if(h>=5&&h<7)  return['#1a1208','#2a1e0a','#1a2a10'];
  if(h>=7&&h<10) return['#1a200a','#162010','#0e1a0c'];
  if(h>=10&&h<17)return['#0c1a0e','#081408','#050e06'];
  if(h>=17&&h<19)return['#1a1206','#1e1a08','#0e1a0c'];
  if(h>=19&&h<21)return['#120e06','#1a1008','#0a1408'];
  return['#050a05','#080e08','#050a06'];
}
function drawSky(){
  const[top,mid,bot]=getSkyColors();
  const g=skyCtx.createLinearGradient(0,0,0,H());
  g.addColorStop(0,top);g.addColorStop(0.5,mid);g.addColorStop(1,bot);
  skyCtx.fillStyle=g;skyCtx.fillRect(0,0,W(),H());
  skyCtx.fillStyle='rgba(180,200,160,0.35)';
  for(let i=0;i<80;i++){
    const sx=(i*137.5)%W(),sy=(i*97.3)%(H()*0.55),sz=Math.random()<0.2?1.5:0.8;
    skyCtx.beginPath();skyCtx.arc(sx,sy,sz,0,Math.PI*2);skyCtx.fill();
  }
}
drawSky();

/* ── CONVERGENCE LINES ── */
const convCanvas=document.getElementById('conv-canvas');
const convCtx=convCanvas.getContext('2d');
function resizeConv(){convCanvas.width=W();convCanvas.height=H();}
resizeConv();
function drawConvLines(){
  convCtx.clearRect(0,0,W(),H());
  convCtx.setLineDash([4,7]);
  convCtx.strokeStyle='rgba(196,146,26,0.15)';convCtx.lineWidth=0.8;
  const bx=W()*0.5,by=H()*0.33;
  convCtx.beginPath();convCtx.moveTo(0,H());convCtx.lineTo(bx-60,by+30);convCtx.stroke();
  convCtx.beginPath();convCtx.moveTo(W(),H());convCtx.lineTo(bx+60,by+30);convCtx.stroke();
  convCtx.setLineDash([3,5]);
  convCtx.strokeStyle='rgba(46,94,30,0.25)';convCtx.lineWidth=0.7;
  convCtx.beginPath();convCtx.moveTo(0,H()*0.88);convCtx.quadraticCurveTo(W()*0.15,H()*0.76,W()*0.38,H()*0.65);convCtx.stroke();
  convCtx.beginPath();convCtx.moveTo(W(),H()*0.88);convCtx.quadraticCurveTo(W()*0.85,H()*0.76,W()*0.62,H()*0.65);convCtx.stroke();
}
drawConvLines();

/* ── PARALLAX ── */
const layers=document.querySelectorAll('.p-layer[data-depth]');
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
function applyParallax(){
  const dx=(mx/W()-0.5)*2,dy=(my/H()-0.5)*2;
  layers.forEach(l=>{
    const d=parseFloat(l.dataset.depth)||0;
    l.style.transform=`translate(${dx*d*-220}px,${dy*d*-80}px)`;
  });
  requestAnimationFrame(applyParallax);
}
applyParallax();

/* ── PARTICLES ── */
const pCanvas=document.getElementById('particle-canvas');
const pCtx=pCanvas.getContext('2d');
function resizeP(){pCanvas.width=W();pCanvas.height=H();}
resizeP();
const wind=Array.from({length:25},()=>({x:Math.random(),y:Math.random(),vx:0.0004+Math.random()*0.0008,vy:(Math.random()-0.5)*0.0002,phase:Math.random()*Math.PI*2,a:0.08+Math.random()*0.14,r:0.6+Math.random()*0.9}));
const leaves=[];
const LEAF_COLORS=['#2a5a18','#245014','#224c16','#7a5a20','#6a4e1a','#3a6018'];
function spawnLeaves(cx,cy,count=4){
  for(let i=0;i<count;i++){
    const ang=(Math.random()-0.5)*Math.PI,spd=1.5+Math.random()*2.5;
    leaves.push({x:cx+(Math.random()-0.5)*60,y:cy+(Math.random()-0.5)*40,vx:Math.cos(ang)*spd,vy:-Math.random()*2-1,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.18,life:1,decay:0.006+Math.random()*0.006,w:8+Math.random()*10,h:5+Math.random()*6,color:LEAF_COLORS[Math.floor(Math.random()*LEAF_COLORS.length)]});
  }
}
const foliageZones=document.querySelectorAll('.foliage-zone');
let lastLeafSpawn=0;
function checkFoliageProx(t){
  if(t-lastLeafSpawn<400)return;
  foliageZones.forEach(z=>{
    const cx=parseFloat(z.dataset.cx)*W()/1600,cy=parseFloat(z.dataset.cy)*H()/900;
    if(Math.hypot(mx-cx,my-cy)<140){spawnLeaves(cx,cy,3);lastLeafSpawn=t;}
  });
}
function drawParticles(t){
  pCtx.clearRect(0,0,W(),H());
  wind.forEach(w=>{
    w.x+=w.vx;w.y+=w.vy+Math.sin(t*0.0004+w.phase)*0.0001;
    if(w.x>1.05)w.x=-0.05;if(w.y<0)w.y=1;if(w.y>1)w.y=0;
    pCtx.beginPath();pCtx.arc(w.x*W(),w.y*H(),w.r,0,Math.PI*2);
    pCtx.fillStyle=`rgba(180,210,160,${w.a})`;pCtx.fill();
  });
  for(let i=leaves.length-1;i>=0;i--){
    const l=leaves[i];l.x+=l.vx;l.y+=l.vy;l.vy+=0.05;l.vx*=0.99;l.rot+=l.rotV;l.life-=l.decay;
    if(l.life<=0){leaves.splice(i,1);continue;}
    pCtx.save();pCtx.translate(l.x,l.y);pCtx.rotate(l.rot);pCtx.globalAlpha=l.life;
    pCtx.fillStyle=l.color;pCtx.beginPath();pCtx.ellipse(0,0,l.w/2,l.h/2,0,0,Math.PI*2);pCtx.fill();
    pCtx.strokeStyle='rgba(0,0,0,0.2)';pCtx.lineWidth=0.5;pCtx.beginPath();pCtx.moveTo(-l.w/2,0);pCtx.lineTo(l.w/2,0);pCtx.stroke();
    pCtx.restore();
  }
}
function loop(t){checkFoliageProx(t);drawParticles(t);requestAnimationFrame(loop);}
requestAnimationFrame(loop);

window.addEventListener('resize',()=>{resizeSky();resizeConv();resizeP();drawSky();drawConvLines();});
</script>
</body>
</html>
